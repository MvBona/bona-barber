<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soul Black Barbearia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0a;
      --bg2:      #141414;
      --bg3:      #1e1e1e;
      --gold:     #c9a447;
      --gold-dim: rgba(201,164,71,0.12);
      --text:     #f0ece0;
      --muted:    #77736a;
      --green:    #4caf7d;
      --red:      #e05555;
      --gray:     #444;
      --border:   #252525;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

    /* ── HEADER ── */
    header {
      text-align:center;
      padding:2rem 1rem 1.8rem;
      background:linear-gradient(180deg,#0d0d0d 0%,var(--bg) 100%);
      border-bottom:1px solid var(--border);
      position:relative;
    }
    header::before {
      content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:60%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(201,164,71,.4),transparent);
    }
    header img {
      width:min(65vw, 220px); height:min(65vw, 220px);
      object-fit:contain;
      border-radius:50%;
      border:2px solid rgba(201,164,71,.35);
      box-shadow:0 0 0 8px rgba(201,164,71,.04), 0 12px 40px rgba(0,0,0,.7);
      margin-bottom:1rem;
    }
    header h1 { display:none; }
    .agenda-badge {
      display:inline-flex; align-items:center; gap:.5rem;
      background:rgba(201,164,71,.07); border:1px solid rgba(201,164,71,.25);
      border-radius:999px; padding:.38rem 1.1rem;
      font-family:'Cinzel',serif; font-size:.58rem;
      color:var(--gold); letter-spacing:.25em; text-transform:uppercase;
    }
    .gold-line {
      width:50px; height:1px; background:var(--gold);
      margin:.9rem auto 0; border-radius:2px; opacity:.4;
    }

    /* ── NAV ── */
    nav {
      display:flex; background:var(--bg2);
      border-bottom:1px solid var(--border);
      overflow-x:auto; scrollbar-width:none;
    }
    nav::-webkit-scrollbar { display:none; }
    nav button {
      flex:1; min-width:75px; padding:.9rem .4rem;
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--muted); font-family:'Cinzel',serif; font-size:.7rem;
      font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      cursor:pointer; transition:all .2s; white-space:nowrap;
    }
    nav button.active { color:var(--gold); border-bottom-color:var(--gold); background:var(--gold-dim); }
    nav button:hover:not(.active) { color:var(--text); background:rgba(255,255,255,.03); }

    /* ── MAIN ── */
    main { max-width:860px; margin:0 auto; padding:1.8rem 1rem 3rem; }
    .loading { text-align:center; padding:4rem 1rem; color:var(--muted); font-size:.85rem; letter-spacing:.1em; }
    .spinner { display:inline-block; width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── LEGEND ── */
    .legend {
      display:flex; gap:1.5rem; justify-content:center;
      margin-bottom:1.5rem; flex-wrap:wrap;
    }
    .legend-item { display:flex; align-items:center; gap:.4rem; font-size:.7rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
    .ldot { width:8px; height:8px; border-radius:50%; }

    /* ── DAY VIEW ── */
    .day-nav {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem;
    }
    .day-nav button {
      width:42px; height:42px; background:var(--bg3); border:1px solid var(--border);
      color:var(--gold); border-radius:50%; font-size:1.3rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all .2s;
    }
    .day-nav button:hover { background:var(--gold-dim); border-color:var(--gold); }
    .day-title { text-align:center; }
    .day-title .dt-main { font-family:'Cinzel',serif; font-size:1.4rem; font-weight:700; }
    .day-title .dt-sub { color:var(--muted); font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; margin-top:.2rem; }

    .slots-list { display:flex; flex-direction:column; gap:.5rem; }
    .slot-row {
      display:flex; align-items:center; gap:1rem;
      padding:.95rem 1.2rem; background:var(--bg2);
      border:1px solid var(--border); border-left:3px solid transparent;
      border-radius:8px; transition:all .2s;
    }
    .slot-row.livre     { border-left-color:var(--green); }
    .slot-row.ocupado   { border-left-color:var(--red);  opacity:.45; }
    .slot-row.bloqueado { border-left-color:var(--gray); opacity:.35; }
    .slot-row.passado   { border-left-color:#2a2a2a; opacity:.28; }
    .sdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .slot-row.livre     .sdot { background:var(--green); }
    .slot-row.ocupado   .sdot { background:var(--red); }
    .slot-row.bloqueado .sdot { background:var(--gray); }
    .slot-row.passado   .sdot { background:#333; }
    .stime { font-family:'Cinzel',serif; font-size:1.05rem; font-weight:600; }
    .slabel { font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; }
    .slot-row.livre     .slabel { color:var(--green); }
    .slot-row.ocupado   .slabel { color:var(--red); }
    .slot-row.bloqueado .slabel { color:var(--gray); }
    .slot-row.passado   .slabel { color:#444; }

    .past-banner {
      text-align:center; padding:.55rem 1rem; margin-bottom:1.2rem;
      color:var(--muted); font-size:.65rem; letter-spacing:.18em; text-transform:uppercase;
      border:1px solid var(--border); border-radius:6px; background:var(--bg2);
    }
    .empty-msg { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty-msg .eico { font-size:2.5rem; margin-bottom:.8rem; opacity:.4; }

    /* ── WEEK VIEW ── */
    .week-wrap { overflow-x:auto; padding-bottom:.5rem; }
    .week-grid { display:grid; grid-template-columns:repeat(6,minmax(100px,1fr)); gap:6px; min-width:560px; }
    .week-col {}
    .week-col-head {
      text-align:center; padding:.6rem .2rem; background:var(--bg3);
      border:1px solid var(--border); border-radius:6px 6px 0 0; border-bottom:none;
      cursor:pointer; transition:border-color .15s, background .15s;
    }
    .week-col-head:not(.past):hover { border-color:var(--gold); background:var(--gold-dim); }
    .wdn { font-family:'Cinzel',serif; font-size:.6rem; color:var(--gold); letter-spacing:.08em; text-transform:uppercase; }
    .wdd { font-size:1.1rem; font-weight:600; }
    .week-slots { border:1px solid var(--border); border-radius:0 0 6px 6px; overflow:hidden; }
    .wslot { padding:.45rem .3rem; text-align:center; font-size:.78rem; font-weight:500; border-bottom:1px solid var(--border); }
    .wslot:last-child { border-bottom:none; }
    .wslot.livre    { background:rgba(76,175,125,.1);  color:var(--green); }
    .wslot.ocupado  { background:rgba(224,85,85,.07);  color:rgba(224,85,85,.45); text-decoration:line-through; }
    .wslot.bloqueado { background:rgba(68,68,68,.1);   color:var(--gray); }
    .wslot.passado  { background:transparent; color:#2a2a2a; }
    .week-col-head.past { opacity:.3; }

    /* ── MONTH VIEW ── */
    .month-title {
      font-family:'Cinzel',serif; text-align:center; font-size:1.1rem;
      font-weight:700; color:var(--gold); letter-spacing:.12em; text-transform:uppercase;
      margin-bottom:1rem;
    }
    .cal-head { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:3px; }
    .cal-wn { text-align:center; font-family:'Cinzel',serif; font-size:.6rem; color:var(--gold); letter-spacing:.08em; padding:.3rem 0; }
    .cal-wn.sun { color:var(--muted); opacity:.4; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-cell {
      aspect-ratio:1; background:var(--bg2); border:1px solid var(--border);
      border-radius:6px; display:flex; flex-direction:column; align-items:center;
      justify-content:center; cursor:pointer; transition:all .15s; padding:3px; position:relative;
    }
    .cal-cell.empty { background:transparent; border-color:transparent; cursor:default; }
    .cal-cell.prev-month { opacity:.15; cursor:default; }
    .cal-cell.prev-month:hover { border-color:var(--border); background:var(--bg2); }
    .cal-cell.sunday {
      background:var(--bg2); border-color:var(--border); cursor:default;
      opacity:.18;
    }
    .cal-cell.past { opacity:.28; }
    .cal-cell:not(.empty):not(.sunday):hover { border-color:var(--gold); background:var(--gold-dim); }
    .cal-cell.today { border-color:var(--gold) !important; }
    .cdn { font-size:.82rem; font-weight:600; }
    .sun-label { font-size:.5rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
    .cbar { width:75%; height:3px; border-radius:2px; margin-top:3px; }
    .ccount { font-size:.62rem; color:var(--muted); margin-top:3px; letter-spacing:.04em; }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:1.8rem 1rem;
      color:var(--muted); font-size:.7rem; letter-spacing:.12em;
      border-top:1px solid var(--border);
    }
    footer span { color:var(--gold); }
    #last-update { font-size:.6rem; color:#333; margin-top:.4rem; letter-spacing:.08em; transition:color .4s; }
    #last-update.fresh { color:var(--gold); }

    /* ── MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,.75); display:flex;
      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-box {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:12px; padding:1.8rem 1.5rem;
      width:100%; max-width:380px; position:relative;
    }
    .modal-close {
      position:absolute; top:.8rem; right:.8rem;
      background:none; border:none; color:var(--muted);
      font-size:1.1rem; cursor:pointer; line-height:1;
    }
    .modal-close:hover { color:var(--text); }
    .modal-title {
      font-family:'Cinzel',serif; font-size:1rem; font-weight:700;
      color:var(--gold); letter-spacing:.1em; text-transform:uppercase;
      margin-bottom:.25rem;
    }
    .modal-sub { color:var(--muted); font-size:.75rem; letter-spacing:.06em; margin-bottom:1.4rem; }
    .modal-warning {
      background:rgba(201,164,71,.08); border:1px solid rgba(201,164,71,.3);
      border-radius:6px; padding:.6rem .8rem; font-size:.72rem;
      color:var(--gold); margin-bottom:1rem; letter-spacing:.04em;
    }
    .modal-input {
      width:100%; background:var(--bg3); border:1px solid var(--border);
      border-radius:7px; color:var(--text); font-family:'Inter',sans-serif;
      font-size:.9rem; padding:.75rem 1rem; margin-bottom:.75rem;
      outline:none; transition:border-color .2s;
    }
    .modal-input:focus { border-color:var(--gold); }
    .modal-input::placeholder { color:var(--muted); }
    .modal-btn {
      width:100%; padding:.85rem; background:var(--gold);
      border:none; border-radius:7px; color:#111;
      font-family:'Cinzel',serif; font-size:.8rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      cursor:pointer; transition:opacity .2s;
    }
    .modal-btn:hover { opacity:.85; }
    .modal-btn:disabled { opacity:.4; cursor:default; }
    .modal-msg { text-align:center; font-size:.78rem; margin-top:.9rem; min-height:1.2rem; }
    .modal-msg.ok   { color:var(--green); }
    .modal-msg.err  { color:var(--red); }
    .modal-msg.pend { color:var(--gold); }
    .slot-row.livre { cursor:pointer; }
    .slot-row.livre:hover { background:rgba(76,175,125,.06); border-left-color:#6fcf97; }

    .whatsapp-btn {
      position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
      display:flex; align-items:center; gap:.6rem;
      background:#1a1a1a; border:1px solid var(--gold);
      color:var(--gold); text-decoration:none;
      padding:.7rem 1.2rem; border-radius:999px;
      font-family:'Cinzel',serif; font-size:.7rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      box-shadow:0 4px 20px rgba(0,0,0,.5);
      transition:background .2s, box-shadow .2s;
    }
    .whatsapp-btn:hover { background:var(--gold-dim); box-shadow:0 4px 28px rgba(201,164,71,.2); }
    .whatsapp-btn svg { width:18px; height:18px; fill:#25D366; flex-shrink:0; }

    @media(max-width:480px) {
      header img { width:min(60vw,180px); height:min(60vw,180px); }
      .day-title .dt-main { font-size:1.2rem; }

      /* Calendar mobile */
      main { padding:1.2rem .6rem 5rem; }
      .cal-grid { gap:3px; }
      .cal-head { gap:2px; }
      .cal-cell {
        aspect-ratio:unset;
        min-height:52px;
        padding:4px 2px;
        border-radius:5px;
      }
      .cdn { font-size:.78rem; }
      .ccount { font-size:.52rem; }
      .sun-label { display:none; }
      .cbar { width:70%; height:2px; margin-top:2px; }
      .cal-wn { font-size:.52rem; padding:.25rem 0; }
      .month-title { font-size:.95rem; }

      /* Semana: esconde slots indisponíveis no mobile */
      .wslot:not(.livre) { display:none; }

      /* Nav */
      nav button { font-size:.6rem; padding:.8rem .2rem; }

      /* WhatsApp btn */
      .whatsapp-btn { padding:.6rem 1rem; font-size:.65rem; bottom:1rem; right:1rem; }
    }
  </style>
</head>
<body>

<header>
  <img src="/logo.jpeg" alt="Soul Black" onerror="this.style.display='none'">
  <h1>Soul Black</h1>
  <div class="agenda-badge">✂&nbsp; Agenda Online</div>
  <div class="gold-line"></div>
</header>

<nav>
  <button class="active" data-view="dia"    onclick="setView('dia')">Dia</button>
  <button              data-view="semana" onclick="setView('semana')">Semana</button>
  <button              data-view="mes"    onclick="setView('mes')">Mês</button>
  <button              data-view="proximo" onclick="setView('proximo')">Próximo</button>
</nav>

<main>
  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Carregando...</div>
  </div>
</main>

<footer>Agenda — <span>Soul Black Barbearia</span><div id="last-update"></div></footer>

<div id="modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Agendar</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-warning" id="modal-warning" style="display:none">⚡ Horário próximo — sujeito à aprovação do barbeiro</div>
    <input id="book-nome" class="modal-input" type="text" placeholder="Seu nome completo" autocomplete="name">
    <input id="book-phone" class="modal-input" type="tel" placeholder="WhatsApp (ex: 21999991234)" autocomplete="tel">
    <button id="book-btn" class="modal-btn" onclick="submitBooking()">Confirmar agendamento</button>
    <div id="book-msg" class="modal-msg"></div>
  </div>
</div>

<a class="whatsapp-btn" href="https://wa.me/595994193000" target="_blank" rel="noopener">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  Agendar
</a>

<script>
const PAD = n => String(n).padStart(2,'0');
const FMT = d => `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`;
const DAYS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS= ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let view = 'dia';
let navDate = new Date();
let pollTimer = null;
const POLL_MS = 60000;

function markUpdated() {
  const el = document.getElementById('last-update');
  if (!el) return;
  const now = new Date();
  el.textContent = `atualizado às ${PAD(now.getHours())}:${PAD(now.getMinutes())}`;
  el.classList.add('fresh');
  setTimeout(() => el.classList.remove('fresh'), 1500);
}

function resetPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (document.visibilityState === 'visible') load();
  }, POLL_MS);
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') load();
});

function setView(v) {
  view = v;
  navDate = new Date();
  document.querySelectorAll('nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === v)
  );
  load();
  resetPoll();
}

async function load() {
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>Carregando...</div>';
  try {
    const qs = view === 'dia' ? `&date=${FMT(navDate)}` : '';
    const r = await fetch(`/api/slots?view=${view}${qs}`);
    const data = await r.json();
    render(data);
    markUpdated();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="loading">Erro ao carregar. Tente novamente.</div>';
  }
}

function render(data) {
  if (view === 'dia') renderDay(data);
  else if (view === 'semana') renderWeek(data);
  else renderMonth(data);
}

/* ── DIA ── */
function renderDay(data) {
  const day = data.dates[0];
  if (!day) { document.getElementById('content').innerHTML = '<div class="loading">Sem dados.</div>'; return; }

  const todayStr = FMT(new Date());
  const isPast = day.date < todayStr;
  const isToday = day.date === todayStr;

  // Para hoje: filtra só horários futuros. Para outros dias: mostra tudo.
  const visible = isToday
    ? day.slots.filter(s => {
        const [h,m] = s.horario.split(':').map(Number);
        const t = new Date(); t.setHours(h,m,0,0);
        return t > new Date();
      })
    : day.slots;

  const livre = isPast ? 0 : visible.filter(s => s.status === 'livre').length;
  const [,mm,dd] = day.date.split('-');
  const dayName = DAYS[new Date(day.date+'T12:00:00').getDay()];
  const subtitle = isPast ? 'Dia passado' : `${livre} disponív${livre===1?'el':'eis'}`;

  let html = `
    <div class="day-nav">
      <button onclick="shiftDay(-1)">‹</button>
      <div class="day-title">
        <div class="dt-main">${dayName}, ${dd}/${mm}</div>
        <div class="dt-sub">${subtitle}</div>
      </div>
      <button onclick="shiftDay(1)">›</button>
    </div>`;

  if (!isPast) {
    html += `<div class="legend">
      <div class="legend-item"><div class="ldot" style="background:var(--green)"></div>Disponível</div>
      <div class="legend-item"><div class="ldot" style="background:var(--red)"></div>Ocupado</div>
    </div>`;
  } else {
    html += `<div class="past-banner">Horários encerrados para este dia</div>`;
  }

  html += `<div class="slots-list">`;

  const DEFAULT_HOURS = ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
  const slotsToShow = (!visible.length && isPast) ? DEFAULT_HOURS.map(h => ({ horario: h, status: 'livre' })) : visible;

  if (!slotsToShow.length) {
    html += `<div class="empty-msg"><div class="eico">✂</div><p>Sem horários disponíveis</p></div>`;
  } else {
    for (const s of slotsToShow) {
      const cls = isPast ? 'passado' : (s.status === 'agendado' ? 'ocupado' : s.status);
      const lbl = isPast ? 'Encerrado' : (s.status === 'livre' ? 'Disponível' : s.status === 'bloqueado' ? 'Bloqueado' : 'Ocupado');
      const click = (cls === 'livre') ? `onclick="openBooking('${day.date}','${s.horario}')"` : '';
      html += `<div class="slot-row ${cls}" ${click}><div class="sdot"></div><div class="stime">${s.horario}</div><div class="slabel">${lbl}</div></div>`;
    }
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function shiftDay(d) {
  navDate = new Date(navDate);
  navDate.setDate(navDate.getDate() + d);
  if (navDate.getDay() === 0) navDate.setDate(navDate.getDate() + (d > 0 ? 1 : -1));
  load();
}

/* ── SEMANA ── */
function renderWeek(data) {
  const now = new Date();
  const todayStr = FMT(now);
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  function isSlotPast(dateStr, horario) {
    if (dateStr < todayStr) return true;
    if (dateStr > todayStr) return false;
    const [h, m] = horario.split(':').map(Number);
    return (h * 60 + m) <= nowMinutes;
  }

  let html = `
    <div class="legend" style="margin-bottom:1.2rem">
      <div class="legend-item"><div class="ldot" style="background:var(--green)"></div>Disponível</div>
      <div class="legend-item"><div class="ldot" style="background:var(--red)"></div>Ocupado</div>
    </div>
    <div class="week-wrap"><div class="week-grid">`;

  for (const day of data.dates) {
    const isPastDay = day.date < todayStr;
    const [,mm,dd] = day.date.split('-');
    const dn = DAYS[new Date(day.date+'T12:00:00').getDay()];
    html += `<div class="week-col">
      <div class="week-col-head${isPastDay ? ' past' : ''}" onclick="gotoDay('${day.date}')"><div class="wdn">${dn}</div><div class="wdd">${dd}</div></div>
      <div class="week-slots">`;

    const weekSlots = (!day.slots.length && isPastDay)
      ? ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'].map(h => ({ horario: h, status: 'livre' }))
      : day.slots;

    if (!weekSlots.length) {
      html += `<div class="wslot passado" style="font-size:.65rem;color:#2a2a2a">—</div>`;
    } else {
      for (const s of weekSlots) {
        const slotPast = isSlotPast(day.date, s.horario);
        const cls = slotPast ? 'passado' : (s.status === 'agendado' ? 'ocupado' : s.status);
        const wclick = cls === 'livre' ? `onclick="openBooking('${day.date}','${s.horario}')"` : '';
        html += `<div class="wslot ${cls}" ${wclick}>${s.horario}</div>`;
      }
    }
    html += '</div></div>';
  }

  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

/* ── MÊS ── */
function renderMonth(data) {
  if (!data.dates.length) { document.getElementById('content').innerHTML = '<div class="loading">Sem dados.</div>'; return; }

  const fd = new Date(data.dates[0].date+'T12:00:00');
  const year = fd.getFullYear(), month = fd.getMonth();
  const slotMap = {};
  for (const d of data.dates) slotMap[d.date] = d.slots;

  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = FMT(new Date());

  let html = `<div class="month-title">${MONTHS[month]} ${year}</div>
    <div class="cal-head">${DAYS.map((d,i)=>`<div class="cal-wn${i===0?' sun':''}">${d}</div>`).join('')}</div>
    <div class="cal-grid">`;

  const prevMonthLastDay = new Date(year, month, 0).getDate();
  for (let i = 0; i < firstDow; i++) {
    const prevDay = prevMonthLastDay - firstDow + 1 + i;
    html += `<div class="cal-cell prev-month"><div class="cdn">${prevDay}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${PAD(month+1)}-${PAD(d)}`;
    const dow = new Date(ds+'T12:00:00').getDay();
    const isSun = dow === 0;
    const isPast = ds < todayStr;
    const isToday = ds === todayStr;
    const slots = slotMap[ds] || [];
    const livre = slots.filter(s => s.status === 'livre').length;
    const total = slots.length;

    let barColor = '#333', barW = 0;
    if (!isSun && isPast) {
      barColor = total > 0 ? '#2e2e2e' : '#222';
      barW = 100;
    } else if (!isSun && !isPast && total > 0) {
      const pct = livre / total;
      barColor = pct > .5 ? '#4caf7d' : pct > .2 ? '#c9a447' : '#e05555';
      barW = Math.round(pct * 100);
    }

    const cls = [
      'cal-cell',
      isSun ? 'sunday' : '',
      isPast ? 'past' : '',
      isToday ? 'today' : ''
    ].filter(Boolean).join(' ');

    const click = !isSun ? `onclick="gotoDay('${ds}')"` : '';
    const showBar = !isSun && (isPast || total > 0);

    html += `<div class="${cls}" ${click}>
      <div class="cdn">${d}</div>
      ${isSun ? `<div class="sun-label">Fechado</div>` : ''}
      ${showBar ? `
        <div class="cbar" style="background:linear-gradient(to right,${barColor} ${barW}%,#252525 ${barW}%)"></div>
        ${!isPast && livre > 0 ? `<div class="ccount">${livre} livre${livre !== 1 ? 's' : ''}</div>` : ''}
        ${!isPast && livre === 0 && total > 0 ? `<div class="ccount" style="color:var(--red)">Lotado</div>` : ''}
      ` : ''}
    </div>`;
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function gotoDay(ds) {
  view = 'dia';
  navDate = new Date(ds+'T12:00:00');
  document.querySelectorAll('nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === 'dia')
  );
  load();
}

/* ── MODAL DE AGENDAMENTO ── */
let bookingDate = null, bookingHorario = null;

function openBooking(date, horario) {
  bookingDate = date; bookingHorario = horario;
  const [, mm, dd] = date.split('-');
  const now = new Date();
  const [h, m] = horario.split(':').map(Number);
  const slot = new Date(now); slot.setHours(h, m, 0, 0);
  if (date > FMT(now)) slot.setDate(slot.getDate() + (new Date(date+'T12:00').getDate() - now.getDate()));
  const diffMin = (new Date(date+'T'+horario) - now) / 60000;
  const urgent = diffMin < 60;

  document.getElementById('modal-sub').textContent = `${dd}/${mm} às ${horario}`;
  document.getElementById('modal-warning').style.display = urgent ? 'block' : 'none';
  document.getElementById('book-btn').textContent = urgent ? 'Solicitar aprovação' : 'Confirmar agendamento';
  document.getElementById('book-nome').value = '';
  document.getElementById('book-phone').value = '';
  document.getElementById('book-msg').textContent = '';
  document.getElementById('book-msg').className = 'modal-msg';
  document.getElementById('book-btn').disabled = false;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('book-nome').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function submitBooking() {
  const nome = document.getElementById('book-nome').value.trim();
  const telefone = document.getElementById('book-phone').value.trim();
  const msg = document.getElementById('book-msg');
  const btn = document.getElementById('book-btn');

  if (!nome || nome.length < 2) { msg.textContent = 'Informe seu nome.'; msg.className = 'modal-msg err'; return; }
  const digits = telefone.replace(/\D/g, '');
  if (digits.length < 10) { msg.textContent = 'Número de WhatsApp inválido.'; msg.className = 'modal-msg err'; return; }

  btn.disabled = true;
  msg.textContent = 'Aguarde...'; msg.className = 'modal-msg';

  try {
    const r = await fetch('/api/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: bookingDate, horario: bookingHorario, nome, telefone: digits }),
    });
    const data = await r.json();
    if (!r.ok) {
      msg.textContent = data.error || 'Erro ao agendar.'; msg.className = 'modal-msg err';
      btn.disabled = false; return;
    }
    if (data.tipo === 'pendente') {
      msg.textContent = '⏳ Solicitação enviada! O barbeiro confirmará em breve.'; msg.className = 'modal-msg pend';
    } else {
      msg.textContent = '✅ Agendado! Você receberá lembretes no WhatsApp.'; msg.className = 'modal-msg ok';
    }
    setTimeout(() => { closeModal(); load(); }, 2500);
  } catch(e) {
    msg.textContent = 'Erro de conexão. Tente novamente.'; msg.className = 'modal-msg err';
    btn.disabled = false;
  }
}

load();
resetPoll();
</script>
